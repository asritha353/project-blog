<article>

<section id="intro">
<h2>Introduction</h2>

<p>
This project focuses on building a complete data warehouse using Amazon e-commerce sales data. Raw CSV data was transformed into structured tables using Python and loaded into PostgreSQL using star schema design.
</p>

<p>
To improve efficiency, incremental loading was implemented so that only new records are loaded during future executions.
</p>
</section>

<section id="dataset">
<h2>Dataset Description</h2>

<p>
The dataset contains Amazon India sales transactions including order details, quantity, product category, amount, state, city, and fulfilment details.
</p>

<table>
<tr><th>Column</th><th>Description</th></tr>
<tr><td>Order ID</td><td>Unique Order Number</td></tr>
<tr><td>Date</td><td>Order Date</td></tr>
<tr><td>Category</td><td>Product Category</td></tr>
<tr><td>Qty</td><td>Quantity</td></tr>
<tr><td>Amount</td><td>Sales Amount</td></tr>
<tr><td>State</td><td>Customer State</td></tr>
<tr><td>Status</td><td>Order Status</td></tr>
</table>
</section>

<section id="architecture">
<h2>System Architecture</h2>

<div class="box">
CSV Files → Python → Cleaning & Transformation → PostgreSQL Warehouse → SQL Analysis
</div>

<p>
The project follows ETL architecture where source files are extracted, cleaned, transformed, and loaded into a warehouse for analysis.
</p>
</section>

<section id="schema">
<h2>Star Schema Design</h2>

<p>
The warehouse was designed using one fact table and multiple dimension tables.
</p>

<ul>
<li>fact_sales</li>
<li>dim_date</li>
<li>dim_product</li>
<li>dim_location</li>
<li>dim_order_status</li>
<li>dim_fulfilment</li>
</ul>

<h3>Create Product Dimension</h3>

<pre>
CREATE TABLE dim_product(
 product_key SERIAL PRIMARY KEY,
 sku VARCHAR(50),
 category VARCHAR(50),
 size VARCHAR(20)
);
</pre>

<h3>Create Fact Table</h3>

<pre>
CREATE TABLE fact_sales(
 sales_key SERIAL PRIMARY KEY,
 product_key INT,
 date_key INT,
 quantity INT,
 amount_inr NUMERIC(12,2)
);
</pre>

</section>

<section id="etl">
<h2>ETL Pipeline</h2>

<h3>Extract</h3>

<pre>
import pandas as pd

df = pd.read_csv(
 "Amazon Sale Report.csv",
 low_memory=False
)
</pre>

<h3>Transform</h3>

<pre>
df.columns = df.columns.str.lower()
df.columns = df.columns.str.replace(" ","_")

df['date'] = pd.to_datetime(
 df['date'],
 errors='coerce'
)

df['amount'] = df['amount'].fillna(0)

df = df.drop_duplicates()
</pre>

<h3>Load</h3>

<pre>
from sqlalchemy import create_engine

engine = create_engine(
'postgresql://postgres:password@localhost:5432/amazon_dw'
)

df.to_sql(
 'staging_sales',
 engine,
 if_exists='replace',
 index=False
)
</pre>

</section>

<section>
<h2>Dimension Table Loading</h2>

<h3>Product Dimension</h3>

<pre>
product_df = df[
 ['sku','style','category','size']
].drop_duplicates()

product_df.to_sql(
 'dim_product',
 engine,
 if_exists='append',
 index=False
)
</pre>

<h3>Date Dimension</h3>

<pre>
date_df = pd.DataFrame()

date_df['full_date'] = pd.to_datetime(df['date'])

date_df['day'] = date_df['full_date'].dt.day
date_df['month'] = date_df['full_date'].dt.month
date_df['year'] = date_df['full_date'].dt.year
</pre>

</section>

<section id="incremental">
<h2>Incremental Loading using Watermark</h2>

<p>
To avoid full data reload every run, watermark logic stores the latest loaded date.
</p>

<pre>
CREATE TABLE etl_watermark(
 table_name VARCHAR(50),
 last_loaded_date DATE
);
</pre>

<pre>
SELECT last_loaded_date
FROM etl_watermark
WHERE table_name='fact_sales';
</pre>

<pre>
new_df = df[
 df['date'] > last_loaded_date
]
</pre>

<div class="box">
Run 1 → Full Load<br>
Run 2 → Load Only New Rows<br>
Next Runs → Continue Incremental Load
</div>

</section>

<section id="insights">
<h2>Business Insights</h2>

<h3>Top States by Revenue</h3>

<pre>
SELECT state,
SUM(amount_inr) revenue
FROM fact_sales fs
JOIN dim_location dl
ON fs.location_key = dl.location_key
GROUP BY state
ORDER BY revenue DESC;
</pre>

<h3>Monthly Revenue</h3>

<pre>
SELECT month,
SUM(amount_inr)
FROM fact_sales fs
JOIN dim_date dd
ON fs.date_key = dd.date_key
GROUP BY month;
</pre>

<ul>
<li>Maharashtra generated highest revenue</li>
<li>April recorded peak monthly sales</li>
<li>Set category was top category</li>
<li>B2C orders were more than B2B</li>
</ul>

</section>
